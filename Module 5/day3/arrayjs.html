<html>
<head>
    <title>First Document</title>
</head>
<body>
    <button onclick="demo()">Click me for magic</button>
    <div id="content"></div>

    <script>
        function demo() {
            var names = ["Sachin", "Saurav", "Rahul", "Yuvraj"];

            var content = "<ul>";

            for (let i = 0; i < names.length; i++) {
                //content += `<h1>Hello ${names[i]}</h1>`;
                content += `<li>Hello ${names[i]}</li>`;
            }
            content+="</ol>"
            alert(content);
            document.getElementById("content").innerHTML = content;
        }
    </script>
</body>
</html>

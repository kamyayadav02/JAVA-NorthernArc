<html lang="en">
<head>
    <title>Product List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container mt-4 mb-4">
    <h1 class="text-center mb-4">Product CRUD</h1>

    <div class="card shadow-sm rounded mb-4">
        <div class="card-header">
            <h5 class="mb-0">Add Product</h5>
        </div>
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter name">
                </div>
                <div class="col-md-3">
                    <label for="brand" class="form-label">Brand</label>
                    <input type="text" id="brand" class="form-control" placeholder="Enter brand">
                </div>
                <div class="col-md-3">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" id="category" class="form-control" placeholder="Enter category">
                </div>
                <div class="col-md-3">
                    <label for="cost" class="form-label">Cost</label>
                    <input type="number" id="cost" class="form-control" placeholder="Enter cost">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addProduct()">Add Product</button>
        </div>
    </div>

    <div class="card shadow-sm rounded mb-4">
        <div class="card-header">
            <h5 class="mb-0">Filter Products</h5>
        </div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="filterBrand" class="form-label">Brand</label>
                    <input id="filterBrand" type="text" class="form-control" placeholder="Brand">
                </div>
                <div class="col-md-3">
                    <label for="filterCategory" class="form-label">Category</label>
                    <input id="filterCategory" type="text" class="form-control" placeholder="Category">
                </div>
                <div class="col-md-3">
                    <label for="filterName" class="form-label">Name</label>
                    <input id="filterName" type="text" class="form-control" placeholder="Name">
                </div>
                <div class="col-md-3 ms-md-auto text-md-end">
                    <button class="btn btn-success me-2" onclick="filterProduct()">Filter</button>
                    <button class="btn btn-secondary" onclick="getAll()">Clear</button>
                </div>
            </div>

            <div class="d-flex justify-content-md-end mt-4">
                <button class="btn btn-info me-2" onclick="sort()">Sort</button>
                <button class="btn btn-warning" onclick="rsort()">Reverse Sort</button>
            </div>
        </div>
    </div>

    <div id="content"></div>
</div>
</body>
<script>
    var names=[];
    function drawTable(){
        var content=`<div class="table-responsive">
<table class="table table-bordered table-hover table-striped align-middle">
<thead class="table-dark">
<tr>
<th>name</th>
<th>category</th>
<th>brand</th>
<th>cost</th>
<th class="text-center">update</th>
<th class="text-center">delete</th>
</tr>
</thead>
<tbody>`;
        if(names.length===0){
            content += `<tr><td colspan="6" class="text-center text-muted">No products found</td></tr>`;
        }
        for(let i=0;i<names.length;i++) {
            content += `<tr>
<td>${names[i]["name"]}</td>
<td>${names[i]["category"]}</td>
<td>${names[i]["brand"]}</td>
<td>${names[i]["cost"]}</td>
<td class="text-center"><button class="btn btn-outline-primary btn-sm" onclick="updateProduct('${names[i].id}')">Update</button></td>
<td class="text-center"><button class="btn btn-outline-danger btn-sm" onclick="deleteProduct('${names[i].id}')">Delete</button></td>
</tr>
`;
        }
            content+=`</tbody>`;
            content+=`</table></div>`

            document.getElementById('content').innerHTML=content


    }
    window.onload = function() {
        getAll();
    }
    // for basic crud use drawTable() otherwise getAll()

    function getAll() {
       fetch("http://localhost:8080/api/products")
        .then((response) => {
            return response.json()
        })
        .then(data => {
            console.log(data);
            names=data;
            drawTable();

        }).catch(err => console.log(err));
    }
    function updateProduct(id){
        var newname=document.getElementById("name").value;
        var newbrand=document.getElementById("brand").value;
        var newcost=parseInt(document.getElementById("cost").value);
        var newcategory=document.getElementById("category").value;

        var product=names.find((product)=>product["id"]==id)

        product["name"]=newname;
        product["brand"]=newbrand;
        product["cost"]=newcost;
        product["category"]=newcategory;


        fetch(`http://localhost:8080/api/products/${id}`,{
            method:"PUT",
            body:JSON.stringify(product),
            headers:{"Content-Type":"application/json"}
        })
            .then((response) => {
                if(response.ok){
                    console.log("Product updated successfully");
                    getAll();
                }else{
                    console.log("Product not found");
                }
            })
    }
    function deleteProduct(id){
     fetch(`http://localhost:8080/api/products/${id}`,{
         method:"DELETE"
     }).then((response) => {
         if(response.ok){
             console.log("Product deleted successfully");
             getAll();
         }else{
             console.log("Product not found");
         }
     })
    }
    function sort(){
    fetch(`http://localhost:8080/api/products?sort=asc`,{
        method:"GET"
    }).then(response => response.json())
        .then(data => {
            console.log(data);
            names=data;
            drawTable();
        }).catch(err => console.log(err));
    }
    function rsort(){
       fetch(`http://localhost:8080/api/products?sort=desc`,{
           method:"GET"
       }).then(response => response.json())
        .then(data => {
            console.log(data);
            names=data;
            drawTable();
        }).catch(err => console.log(err));
    }

    function addProduct(){
       var newname=document.getElementById("name").value;
       var newbrand=document.getElementById("brand").value;
       var newcost=document.getElementById("cost").value;
       var newcategory=document.getElementById("category").value;

       var product=({
           name:newname,
           brand:newbrand,
           cost:newcost,
           category:newcategory,
       });

       fetch(`http://localhost:8080/api/products`,{
           method:"POST",
           body:JSON.stringify(product),
           headers:{"Content-Type":"application/json"}
       }).then(response =>
       {
           if(response.ok){
               console.log("Product added successfully");
               getAll();
           }else{
               console.log("Product not found");
           }
       })

    }
    // drawTable() when i already have data
    function filterProducts(){
        // trim() -> might be empty
        var brand=document.getElementById("filterBrand").value.trim();
        var category=document.getElementById("filterCategory").value.trim();
        var name=document.getElementById("filterName").value.trim();

        let params = new URLSearchParams();

        if (brand !== "") {
            params.append("brand", brand);
        }

        if (category !== "") {
            params.append("category", category);
        }

        if (name !== "") {
            params.append("name", name);
        }

        fetch(`http://localhost:8080/api/products?${params.toString()}`, {
            method:"GET"
        }).then(response => response.json())
            .then(data => {
                console.log(data);
                names=data;
                drawTable();
            }).catch(err => console.log(err));
    }
    function filterProduct(){
        filterProducts();
    }

    // do for every filter at once, instead of this
    // function filterName(){
    //     var name=document.getElementById("filterName").value;
    //     fetch(`http://localhost:8080/products/${name}`,{
    //         method:"GET"
    //     }).then(response => response.json())
    //     .then(data => {
    //         console.log(data);
    //         names=data;
    //         drawTable();
    //     }).catch(err => console.log(err));
    // }
</script>
</html>

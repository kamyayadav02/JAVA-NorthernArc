<html>
<head>
    <title>First Document</title>
</head>
<body>
    <button onclick="demo()">Click me for magic</button>
    <div id="content"></div>

    <script>
        function demo() {
            var data = {
                fname: "Riya",
                lname: "Malhotra",
                email: "riyam@gmail.com"
            };

            var content = document.getElementById("content");

            content.innerHTML =
                `<h1>Hello ${data.fname} ${data.lname}, how are you doing today?</h1>`;
        }
    </script>
</body>
</html>

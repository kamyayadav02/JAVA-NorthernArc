<!DOCTYPE html>
<html>
<head>
    <title>First Document</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

    <style>
        div{
            color: red;
            background-color: yellow;
            border: 1px solid black;
        }

       
/* Extra Small Devices */
        @media screen and (max-width: 319px){
            .col-xs-12{
                width: 100%;
            }
        }

        /* Small Devices */
        @media screen and (min-width:320px) and (max-width:767px){

            .col-sm-1 { 
                width: 8.333%; }
            .col-sm-2 { 
                width: 16.666%; }
            .col-sm-3 { 
                width: 25%; }
            .col-sm-4 { 
                width: 33.333%; }
            .col-sm-5 {
                 width: 41.666%; }
            .col-sm-6 { 
                width: 50%; }
            .col-sm-7 { 
                width: 58.333%; }
            .col-sm-8 { 
                width: 66.666%; }
            .col-sm-9 { 
                width: 75%; }
            .col-sm-10 {
                
                width: 83.333%; }
            .col-sm-11 {
                 width: 91.666%; }
            .col-sm-12 {
                 width: 100%; }
        }

        /* Medium Devices */
        @media screen and (min-width:768px) and (max-width:1020px){

            .col-md-1 { 
                width: 8.333%; }
            .col-md-2 {
                 width: 16.666%; }
            .col-md-3 { 
                width: 25%; }
            .col-md-4 {
                 width: 33.333%; }
            .col-md-5 {
                 width: 41.666%; }
            .col-md-6 {
                 width: 50%; }
            .col-md-7 {
                 width: 58.333%; }
            .col-md-8 {
                 width: 66.666%; }
            .col-md-9 {
                 width: 75%; }
            .col-md-10 { 
                width: 83.333%; }
            .col-md-11 { 
                width: 91.666%; }
            .col-md-12 { 
                width: 100%; }
        }

        /* Large Devices */
        @media screen and (min-width:1021px){

            .col-lg-1 { 
                width: 8.333%; }
            .col-lg-2 { 
                width: 16.666%; }
            .col-lg-3 { 
                width: 25%; }
            .col-lg-4 { 
                width: 33.333%; }
            .col-lg-5 {
                 width: 41.666%; }
            .col-lg-6 { 
                width: 50%; }
            .col-lg-7 { 
                width: 58.333%; }
            .col-lg-8 { 
                width: 66.666%; }
            .col-lg-9 {
                 width: 75%; }
            .col-lg-10 {
                 width: 83.333%; }
            .col-lg-11 {
                 width: 91.666%; }
            .col-lg-12 {
                 width: 100%; }
        }
    </style>
</head>

<body>

    <div class="col-sm-12 col-md-6 col-lg-3">Box 1</div>
    <div class="col-sm-12 col-md-6 col-lg-3">Box 2</div>

</body>
</html>

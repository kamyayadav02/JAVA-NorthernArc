<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Navigation Example</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .tab {
        padding: 10px 20px;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 5px;
        background-color: #f5f5f5;
        transition: 0.3s;
    }

    .tab.active {
        background-color: #0078d4;
        color: white;
        font-weight: bold;
    }

    .content {
        border: 1px solid #ddd;
        padding: 20px;
        border-radius: 5px;
        min-height: 100px;
        background-color: #fafafa;
    }

    .content h2 {
        margin-top: 0;
    }
</style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="showContent('home', this)">Home</div>
    <div class="tab" onclick="showContent('about', this)">About</div>
    <div class="tab" onclick="showContent('services', this)">Services</div>
    <div class="tab" onclick="showContent('contact', this)">Contact</div>
</div>

<div id="content" class="content">
    <h2>Home</h2>
    <p>Welcome to our website. Explore our offerings and discover how we can help you achieve your goals.</p>
</div>

<script>
    const tabData = {
        home: `
            <h2>Home</h2>
            <p>Welcome to our website. Explore our offerings and discover how we can help you achieve your goals.</p>
        `,
        about: `
            <h2>About</h2>
            <p>We are a passionate team focused on delivering quality solutions and exceptional customer experiences.</p>
        `,
        services: `
            <h2>Services</h2>
            <p>We provide consulting, development, and support services tailored to meet your business needs.</p>
        `,
        contact: `
            <h2>Contact</h2>
            <p>Reach out to us via email or phone. We'd love to hear from you and answer your questions.</p>
        `
    };

    function showContent(section, clickedTab) {
        // Update tab highlighting
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });

        clickedTab.classList.add('active');

        // Update content area
        document.getElementById('content').innerHTML = tabData[section];
    }
</script>

</body>
</html>

<html>
    <head>
        <title>First Document</title>
    </head>
    <body>
        <h1>Hello World</h1>
        <h1>Hello Galaxy</h1>
        <h1>Hello Universe</h1>
    </body>
    <script>
        alert("JS is in action for DOM operation!!");
        var headings=document.getElementByTagName("h1");
        for(var i=0;i<headings.length;i++){
            headings[i].style.color="red";
            headings[i].style.backgroundColor="yellow";
        }
    </script>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Player Management</title>
</head>
<body>

    <button onclick="displayPlayers()">Display Players</button>
    <button onclick="sortPlayers()">Sort Players</button>
    <button onclick="splitPlayers()">Split Players</button>
    <button onclick="tablePlayers()">Table View</button>

    <br> <br>

    <input type="text" id="addItem" placeholder="Enter Player Name">
    <button onclick="addPlayer()">Add Player</button>

    <hr>

    <div id="content"></div>

    <script>

        var names = [ "Sachin Tendulkar","Saurav Ganguly","Rahul Dravid","Yuvraj Singh" ];
        var selectedIndex = -1;
        function displayPlayers() {
            drawlist();
        }
        function drawlist() {var content = "<ol>";

            for (var i = 0; i < names.length; i++) {

                content += ` <li>
                        ${names[i].toUpperCase()}

                        <button onclick="update(${i})">
                            Update
                        </button>

                        <button onclick="removePlayers('${names[i]}')">
                            Remove
                        </button>
                    </li>
                `;
            }
            content += "</ol>";
            document.getElementById("content").innerHTML = content;
        }
        function addPlayer() {
            var newPlayer = document.getElementById("addItem").value;
            if (newPlayer.trim() != "") {
                names.push(newPlayer);
                document.getElementById("addItem").value = "";
                drawlist();
            }
        }

        function update(i) {

            var newname = document.getElementById("addItem").value;

            if (newname.trim() != "") {

                names[i] = newname;

                document.getElementById("addItem").value = "";

                drawlist();
            }
        }

        function removePlayers(nameToRemove) {

            names = names.filter(function(name) {
                return name !== nameToRemove;
            });

            drawlist();
        }

        function sortPlayers() {

            names.sort();

            drawlist();
        }

        function splitPlayers() {

            var content = "<ol>";

            for (var i = 0; i < names.length; i++) {

                var parts = names[i].split(" ");

                content += `  <li> ${parts[0]} | ${parts[1] || ""}</li> `;
            }

            content += "</ol>";

            document.getElementById("content").innerHTML = content;
        }

        function tablePlayers() {

            var content = ` <table border="1" cellpadding="10">
                    <tr>
                        <th>S.No</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Action</th>
                    </tr>
            `;

            for (var i = 0; i < names.length; i++) {

                var parts = names[i].split(" ");

                content += ` <tr>
                        <td>${i + 1}</td>
                        <td>${parts[0]}</td>
                        <td>${parts[1] || ""}</td>
                        <td> <button onclick="editPlayer(${i})">
                                Update
                            </button>
                            <button onclick="removePlayerTable('${names[i]}')">
                                Remove
                            </button>
                        </td>
                    </tr>
                `;
            }
            
            content += `
                <tr>
                    <td colspan="3">
                        <input type="text"
                               id="tableItem"
                               placeholder="Enter Player Name">
                    </td>
                    <td>
                        <button onclick="addPlayerTable()">
                            Add
                        </button>
                        <button onclick="updatePlayerTable()">
                            Update
                        </button>
                    </td>
                </tr>
            `;

            content += "</table>";

            document.getElementById("content").innerHTML = content;
        }
    
        function editPlayer(index) {

            selectedIndex = index;
            document.getElementById("tableItem").value =names[index];
        }

        function updatePlayerTable() {

            var newName = document.getElementById("tableItem").value;

            if (selectedIndex != -1 && newName.trim() != "") {

                names[selectedIndex] = newName;
                selectedIndex = -1;
                tablePlayers();
            }
        }

        function addPlayerTable() {

            var newPlayer = document.getElementById("tableItem").value;

            if (newPlayer.trim() != "") {

                names.push(newPlayer);

                tablePlayers();
            }
        }

        function removePlayerTable(nameToRemove) {

            names = names.filter(function(name) {
                return name !== nameToRemove;
            });
            

            tablePlayers();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Profile Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 30px auto;
        }

        .profile-card {
            border: 2px solid #0078d4;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            background: #f5f9ff;
        }

        .profile-card h2 {
            margin-top: 0;
            color: #0078d4;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        span {
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Live Display Area -->
    <div class="profile-card">
        <h2>User Profile</h2>

        <p><strong>Name:</strong> <span id="displayName">-</span></p>
        <p><strong>Email:</strong> <span id="displayEmail">-</span></p>
        <p><strong>Mobile:</strong> <span id="displayMobile">-</span></p>
        <p><strong>Skill:</strong> <span id="displaySkill">-</span></p>
    </div>

    <!-- Input Section -->
    <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter Name">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Email">
    </div>

    <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobile" placeholder="Enter Mobile Number">
    </div>

    <div class="form-group">
        <label>Skill</label>
        <select id="skill">
            <option value="">Select Skill</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>Angular</option>
        </select>
    </div>

    <script>
     
        document.getElementById("name").addEventListener("keyup", function () {
            document.getElementById("displayName").textContent = this.value;
        });

        document.getElementById("email").addEventListener("keyup", function () {
            document.getElementById("displayEmail").textContent = this.value;
        });

        document.getElementById("mobile").addEventListener("keyup", function () {
            document.getElementById("displayMobile").textContent = this.value;
        });

       
        document.getElementById("skill").addEventListener("change", function () {
            document.getElementById("displaySkill").textContent = this.value;
        });
    </script>

</body>
</html>
